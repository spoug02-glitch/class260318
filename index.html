<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube 급상승 TOP 50</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(255,0,0,0.3);
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    .api-section {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .api-section label {
      font-size: 0.9rem;
      color: #aaa;
      white-space: nowrap;
    }

    .api-input-wrap {
      display: flex;
      gap: 10px;
      flex: 1;
      min-width: 260px;
    }

    .api-section input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-section input:focus { border-color: #ff4444; }

    .api-section input::placeholder { color: #666; }

    .btn {
      padding: 10px 22px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #ff0000;
      color: #fff;
    }
    .btn-primary:hover { background: #cc0000; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: #333;
      color: #aaa;
    }
    .btn-secondary:hover { background: #444; color: #fff; }

    .region-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .region-wrap label { font-size: 0.9rem; color: #aaa; }

    .region-wrap select {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    .region-wrap select:focus { border-color: #ff4444; }

    /* status */
    #status {
      text-align: center;
      padding: 60px 32px;
      color: #666;
      font-size: 1rem;
    }

    #status.error { color: #ff6666; }

    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #ff0000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 28px 32px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    .rank-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 2;
      line-height: 1.4;
    }

    .rank-badge.top3 {
      background: linear-gradient(135deg, #f7c948, #e08b00);
      color: #000;
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #111;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .card:hover .thumb-wrap img { transform: scale(1.05); }

    .duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .card-body {
      padding: 14px;
    }

    .card-title {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .channel {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      gap: 14px;
      font-size: 0.78rem;
      color: #888;
    }

    .stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stats svg { opacity: 0.7; }

    /* category filter */
    .filter-bar {
      padding: 16px 32px 0;
      max-width: 1600px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #444;
      background: transparent;
      color: #aaa;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #888; color: #fff; }
    .filter-btn.active { background: #ff0000; border-color: #ff0000; color: #fff; }

    footer {
      text-align: center;
      padding: 32px;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<header>
  <svg width="40" height="28" viewBox="0 0 40 28" fill="none">
    <rect width="40" height="28" rx="6" fill="white"/>
    <path d="M16 8.5L28 14L16 19.5V8.5Z" fill="#FF0000"/>
  </svg>
  <div>
    <h1>YouTube 급상승 TOP 50</h1>
    <p>실시간 인기 동영상 순위</p>
  </div>
</header>

<div class="api-section">
  <label for="apiKey">API Key</label>
  <div class="api-input-wrap">
    <input type="password" id="apiKey" placeholder="YouTube Data API v3 키를 입력하세요" autocomplete="off" />
    <button class="btn btn-secondary" id="toggleBtn" onclick="toggleKey()">보기</button>
  </div>
  <div class="region-wrap">
    <label for="regionCode">국가</label>
    <select id="regionCode">
      <option value="KR">🇰🇷 한국</option>
      <option value="US">🇺🇸 미국</option>
      <option value="JP">🇯🇵 일본</option>
      <option value="GB">🇬🇧 영국</option>
      <option value="IN">🇮🇳 인도</option>
      <option value="DE">🇩🇪 독일</option>
      <option value="FR">🇫🇷 프랑스</option>
      <option value="BR">🇧🇷 브라질</option>
      <option value="CA">🇨🇦 캐나다</option>
      <option value="AU">🇦🇺 호주</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="fetchTrending()">조회하기</button>
</div>

<div id="filter-bar" class="filter-bar" style="display:none;"></div>
<div id="status">
  <p style="color:#555">API 키를 입력하고 <strong style="color:#aaa">조회하기</strong> 버튼을 누르세요.</p>
</div>
<div id="grid"></div>
<footer id="footer"></footer>

<script>
  let allVideos = [];
  let activeCategory = 'all';

  function toggleKey() {
    const inp = document.getElementById('apiKey');
    const btn = document.getElementById('toggleBtn');
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '숨김'; }
    else { inp.type = 'password'; btn.textContent = '보기'; }
  }

  function fmtNum(n) {
    n = parseInt(n) || 0;
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
    if (n >= 10000) return Math.floor(n / 10000) + '만';
    return n.toLocaleString();
  }

  function fmtDuration(iso) {
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return '';
    const h = parseInt(m[1] || 0), mn = parseInt(m[2] || 0), s = parseInt(m[3] || 0);
    if (h > 0) return `${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${mn}:${String(s).padStart(2,'0')}`;
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  const categoryNames = {
    '1':'필름/애니', '2':'자동차', '10':'음악', '15':'반려동물',
    '17':'스포츠', '18':'단편영화', '19':'여행', '20':'게임',
    '21':'블로그', '22':'블로그', '23':'코미디', '24':'엔터테인먼트',
    '25':'뉴스/정치', '26':'노하우', '27':'교육', '28':'과학/기술',
    '29':'비영리', '10':'음악', '43':'쇼', '44':'여행'
  };

  async function fetchTrending() {
    const key = document.getElementById('apiKey').value.trim();
    const region = document.getElementById('regionCode').value;

    if (!key) { showStatus('error', 'API 키를 입력해 주세요.'); return; }

    showStatus('loading', '');

    try {
      const params = new URLSearchParams({
        part: 'snippet,statistics,contentDetails',
        chart: 'mostPopular',
        regionCode: region,
        maxResults: 50,
        key
      });

      const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?${params}`);
      const data = await res.json();

      if (data.error) {
        showStatus('error', `오류: ${data.error.message}`);
        return;
      }

      allVideos = (data.items || []).map((item, i) => ({
        rank: i + 1,
        id: item.id,
        title: item.snippet.title,
        channel: item.snippet.channelTitle,
        thumb: item.snippet.thumbnails?.maxres?.url || item.snippet.thumbnails?.high?.url || item.snippet.thumbnails?.medium?.url,
        views: item.statistics?.viewCount || 0,
        likes: item.statistics?.likeCount || 0,
        comments: item.statistics?.commentCount || 0,
        duration: fmtDuration(item.contentDetails?.duration || ''),
        published: fmtDate(item.snippet.publishedAt),
        categoryId: item.snippet.categoryId || '',
        categoryName: categoryNames[item.snippet.categoryId] || '기타'
      }));

      buildFilters();
      renderCards(allVideos);

      document.getElementById('footer').textContent =
        `총 ${allVideos.length}개 동영상 · 국가 코드: ${region} · ${new Date().toLocaleString('ko-KR')} 기준`;

    } catch (e) {
      showStatus('error', `네트워크 오류: ${e.message}`);
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    document.getElementById('grid').innerHTML = '';
    document.getElementById('filter-bar').style.display = 'none';
    document.getElementById('footer').textContent = '';

    if (type === 'loading') {
      el.className = '';
      el.innerHTML = '<div class="spinner"></div><p>데이터를 불러오는 중...</p>';
    } else if (type === 'error') {
      el.className = 'error';
      el.innerHTML = `<p>⚠️ ${msg}</p>`;
    } else {
      el.className = '';
      el.innerHTML = `<p>${msg}</p>`;
    }
    el.style.display = '';
  }

  function buildFilters() {
    const cats = [...new Set(allVideos.map(v => v.categoryName))].sort();
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = '';
    bar.style.display = 'flex';
    activeCategory = 'all';

    const allBtn = document.createElement('button');
    allBtn.className = 'filter-btn active';
    allBtn.textContent = '전체';
    allBtn.onclick = () => setFilter('all', allBtn);
    bar.appendChild(allBtn);

    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = cat;
      btn.onclick = () => setFilter(cat, btn);
      bar.appendChild(btn);
    });
  }

  function setFilter(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'all' ? allVideos : allVideos.filter(v => v.categoryName === cat);
    renderCards(filtered);
  }

  function renderCards(videos) {
    document.getElementById('status').style.display = 'none';
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    videos.forEach(v => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = `https://www.youtube.com/watch?v=${v.id}`;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      card.innerHTML = `
        <div class="rank-badge ${v.rank <= 3 ? 'top3' : ''}">#${v.rank}</div>
        <div class="thumb-wrap">
          <img src="${v.thumb}" alt="${escHtml(v.title)}" loading="lazy" onerror="this.src='https://via.placeholder.com/480x270/1a1a1a/444?text=No+Thumbnail'" />
          ${v.duration ? `<span class="duration">${v.duration}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(v.title)}</div>
          <div class="channel">${escHtml(v.channel)}</div>
          <div class="stats">
            <span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              ${fmtNum(v.views)}
            </span>
            <span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
              ${fmtNum(v.likes)}
            </span>
            <span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              ${fmtNum(v.comments)}
            </span>
            <span style="margin-left:auto;color:#666">${v.published}</span>
          </div>
        </div>`;

      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key support
  document.getElementById('apiKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchTrending();
  });
</script>
</body>
</html>
